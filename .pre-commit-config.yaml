# Pre-commit hooks for ferro-hgvs
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
#
# `default_install_hook_types` makes the bare `pre-commit install`
# wire up BOTH `pre-commit` (per-commit fast checks) and `pre-push`
# (the spec-fixture drift guard, which requires a Rust build and
# would be too slow per commit).
default_install_hook_types: [pre-commit, pre-push]

repos:
  # Rust formatting
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      # Spec-fixture drift guard (#397 item 7). CI already runs this
      # check (search for `generate_spec_fixture --check` in
      # `.github/workflows/ci.yml`), but a push that drifts the
      # fixture wastes a full CI cycle to discover the drift. The
      # pre-push stage runs once per `git push` rather than per
      # commit, so the build cost is paid only when actually pushing.
      - id: generate-spec-fixture-check
        name: generate_spec_fixture --check
        entry: cargo run --features dev --example generate_spec_fixture -- --check
        language: system
        # always_run (not types: [rust]) — a push that only touches the
        # spec submodule or test fixtures still needs the drift guard,
        # and pre-commit otherwise skips type-filtered hooks when no
        # matching files are staged in the push range.
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      # Same drift guard for the spec test enumeration. The generator reads
      # hgvs_spec_normalization.json (a gitignored build artifact, absent on a
      # fresh checkout) for deduplication, so bootstrap that fixture first —
      # otherwise --check aborts with "read ...: No such file" instead of a
      # drift verdict. Generating it in-place is cheap and idempotent.
      - id: generate-spec-enumeration-check
        name: generate_spec_enumeration --check
        entry: bash -c 'cargo run --features dev --example generate_spec_fixture && cargo run --features dev --example generate_spec_enumeration -- --check'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

  # Rust linting (optional - can be slow)
  # Uncomment if you want clippy in pre-commit
  # - repo: local
  #   hooks:
  #     - id: cargo-clippy
  #       name: cargo clippy
  #       entry: cargo clippy --features dev -- -D warnings
  #       language: system
  #       types: [rust]
  #       pass_filenames: false

  # Python linting with ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Python type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    # Pinned to match `mypy==1.20.2` in pyproject's dev group, so `pre-commit`
    # and `poe check-typing` / CI type-check with the SAME mypy — a different
    # major (e.g. 2.x) can emit different diagnostics and diverge. This version
    # also satisfies the `exhaustive-match` error code pyproject enables (needs
    # >= 1.16; older mypy rejects it with "Invalid error code(s)").
    rev: v1.20.2
    hooks:
      - id: mypy
        files: ^python/ferro_hgvs/
        args: [--config-file=pyproject.toml]
        # Check the package via `files` in pyproject (the directory) rather than
        # the changed files passed as args: passing both `__init__.py` and
        # `__init__.pyi` makes mypy see module `ferro_hgvs` twice ("Duplicate
        # module"); a directory check pairs the `.pyi` as the stub correctly.
        pass_filenames: false

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
