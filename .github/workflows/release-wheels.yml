name: Build and publish Python wheels

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to upload wheels to (leave blank to build without uploading — dry-run)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-wheels-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  # abi3 wheels: one wheel per (OS, arch) tagged `cp310-abi3`, runs on
  # every CPython >= 3.10. The `-i python<X>` flag is omitted so maturin
  # builds against pyo3's `abi3-py310` limited-API target (set in
  # `Cargo.toml`). See
  # https://pyo3.rs/main/building-and-distribution.html#py_limited_apiabi3
  # and https://www.maturin.rs/bindings#py_limited_apiabi3
  linux:
    name: Linux ${{ matrix.target }} ${{ matrix.manylinux }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64
            manylinux: auto
          - runner: ubuntu-latest
            target: x86_64
            manylinux: musllinux_1_2
          - runner: ubuntu-24.04-arm
            target: aarch64
            manylinux: auto
          - runner: ubuntu-24.04-arm
            target: aarch64
            manylinux: musllinux_1_2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --features python
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.manylinux }}
          path: dist
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64
            # macOS deployment target floor for the wheel. Pinned
            # explicitly (rather than inherited from setup-python's
            # build target) so a runner-image refresh that bumps the
            # default min-target doesn't silently move the abi3 wheel's
            # macOS floor on us.
            macosx_deployment_target: "10.13"
          - runner: macos-14
            target: aarch64
            # Apple Silicon: Python 3.10 on arm64 requires macOS 11+.
            macosx_deployment_target: "11.0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features python
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          architecture: x64
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist --features python
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-windows
          path: dist
          if-no-files-found: error

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist
          if-no-files-found: error

  check-metadata:
    name: Check package metadata
    needs: [linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Install dev dependencies
        run: uv sync --group dev --locked --no-install-project
      - name: Run twine check
        run: uv run --no-sync twine check --strict dist/*

  smoke-test:
    # Verify the abi3 promise: each OS/arch produces a single
    # `cp310-abi3` wheel, and that wheel installs and imports under
    # every supported CPython minor version (3.10..3.14). 3.14 is
    # included so a future CPython release surfaces ABI breakage in the
    # release pipeline rather than at customer install-time.
    name: Smoke ${{ matrix.runner }} py${{ matrix.python-version }}
    needs: [linux, macos, windows]
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-15-intel, macos-14, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Install built wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-index --only-binary :all: --find-links dist ferro-hgvs
      - name: Smoke test (import + parse + eq_int pyclass)
        shell: bash
        # Exercise the abi3 surface beyond just `parse`: pyclass `__eq__`
        # / `__hash__` / `__str__`, an `eq, eq_int` pyclass enum
        # (Consequence), and a constructor that allocates a pyclass
        # instance. The first three lines all use pyo3 macro paths that
        # would surface limited-API breakage if the wheel were ABI-
        # incompatible with the running CPython.
        run: |
          python <<'EOF'
          import ferro_hgvs
          v = ferro_hgvs.parse("NM_000088.3:c.459A>G")
          assert str(v) == "NM_000088.3:c.459A>G", f"str round-trip: {str(v)!r}"
          assert v == ferro_hgvs.parse("NM_000088.3:c.459A>G"), "__eq__"
          assert hash(v) == hash(ferro_hgvs.parse("NM_000088.3:c.459A>G")), "__hash__"
          # eq_int pyclass enum (Consequence). int() cast and equality
          # use the pyo3 limited-API codegen path that abi3 must support.
          cons = ferro_hgvs.Consequence.CodingSequenceVariant
          assert int(cons) == 18, f"eq_int: {int(cons)}"
          print(f"smoke ok: {v!r} cons={cons}")
          EOF

  smoke-test-musllinux:
    # musllinux wheels (built by the `linux` job for both x86_64 and
    # aarch64) ship to Alpine / musl-libc distros. The standard
    # `smoke-test` matrix runs on glibc runners, so it cannot validate
    # the musllinux wheel's pip-install + import flow. This job runs
    # the same import + abi3 surface checks inside a python:<v>-alpine
    # container on each supported Python version — installing the
    # musllinux wheel via the same `pip install --no-index
    # --only-binary :all: --find-links dist ferro-hgvs` call as the
    # glibc smoke-test. #397 item 4.
    name: Smoke musllinux ${{ matrix.arch_runner }} py${{ matrix.python-version }}
    needs: [linux]
    strategy:
      fail-fast: false
      matrix:
        arch_runner:
          - runner: ubuntu-latest
            container_platform: linux/amd64
          - runner: ubuntu-24.04-arm
            container_platform: linux/arm64
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.arch_runner.runner }}
    container:
      image: python:${{ matrix.python-version }}-alpine
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Install built wheel
        shell: sh
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-index --only-binary :all: --find-links dist ferro-hgvs
      - name: Smoke test (import + parse + eq_int pyclass)
        shell: sh
        # Same surface as the glibc smoke-test (parse + __eq__ +
        # __hash__ + eq_int pyclass) so a musllinux ABI regression
        # surfaces under the same checks.
        run: |
          python <<'EOF'
          import ferro_hgvs
          v = ferro_hgvs.parse("NM_000088.3:c.459A>G")
          assert str(v) == "NM_000088.3:c.459A>G", f"str round-trip: {str(v)!r}"
          assert v == ferro_hgvs.parse("NM_000088.3:c.459A>G"), "__eq__"
          assert hash(v) == hash(ferro_hgvs.parse("NM_000088.3:c.459A>G")), "__hash__"
          cons = ferro_hgvs.Consequence.CodingSequenceVariant
          assert int(cons) == 18, f"eq_int: {int(cons)}"
          print(f"musllinux smoke ok: {v!r} cons={cons}")
          EOF

  upload:
    name: Upload to GitHub Release
    needs: [check-metadata, smoke-test, smoke-test-musllinux, sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          REPO: ${{ github.repository }}
        run: gh release upload "$TAG_NAME" dist/* --repo "$REPO" --clobber

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [check-metadata, smoke-test, smoke-test-musllinux, sdist]
    runs-on: ubuntu-latest
    # Only publish on release events (not workflow_dispatch dry-runs)
    if: github.event_name == 'release'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ferro-hgvs
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          attestations: true
          print-hash: true
          verbose: true

  publish-pypi:
    name: Publish to PyPI
    needs: [publish-testpypi]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/ferro-hgvs
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          attestations: true
          print-hash: true
          verbose: true
