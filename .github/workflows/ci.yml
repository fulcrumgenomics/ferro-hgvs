name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  abi3-floor-consistency:
    name: abi3 floor ↔ requires-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install packaging
        # `packaging.specifiers.SpecifierSet` parses compound specs
        # (`">=3.10,<4"`, `">=3.10rc1"`, etc.) per PEP 440/621 — more
        # robust than regex matching the literal string form.
        run: python -m pip install --no-cache-dir 'packaging>=24'
      - name: Assert Cargo.toml abi3-pyXY matches pyproject.toml requires-python
        # Cargo.toml's `abi3-pyXY` pyo3 feature sets the minimum Python
        # version the abi3 wheel can run on; pyproject.toml's
        # `requires-python` declares the minimum Python pip will accept
        # at install time. If they drift (e.g. a future bump on one
        # side only), users hit either a runtime ABI mismatch
        # (`abi3-py311` wheel on `requires-python = ">=3.10"` installs
        # but fails to load on 3.10) or a silently-stale floor
        # (`abi3-py310` wheel still permitted on a project that meant
        # to drop 3.10 support). #397 item 5.
        run: |
          python <<'PY'
          import re
          import sys
          from pathlib import Path
          from packaging.specifiers import SpecifierSet
          from packaging.version import Version

          cargo = Path("Cargo.toml").read_text()
          m = re.search(r'"abi3-py(\d+)"', cargo)
          if not m:
              sys.exit("Could not find abi3-pyXY feature in Cargo.toml")
          abi3_digits = m.group(1)
          if not abi3_digits.startswith("3"):
              sys.exit(f"Unexpected abi3 minor in 'abi3-py{abi3_digits}'")
          # abi3-py310 → minor='10', abi3-py37 → minor='7'.
          abi3_floor = Version(f"3.{abi3_digits[1:]}")

          pyproject = Path("pyproject.toml").read_text()
          m = re.search(r'requires-python\s*=\s*"([^"]+)"', pyproject)
          if not m:
              sys.exit("Could not find requires-python in pyproject.toml")
          spec_str = m.group(1)
          spec = SpecifierSet(spec_str)

          # The abi3 floor is correct iff the wheel's minimum CPython
          # version is the lowest version the spec accepts. We test
          # this by asserting (a) abi3_floor itself satisfies the spec
          # and (b) the immediately-lower minor (3.{N-1}) does not.
          minor = abi3_floor.minor
          if not spec.contains(abi3_floor, prereleases=True):
              sys.exit(
                  f"abi3 floor / requires-python drift: Cargo.toml "
                  f"`abi3-py{abi3_digits}` ({abi3_floor}) does not satisfy "
                  f"pyproject.toml `requires-python = {spec_str!r}`."
              )
          one_below = Version(f"3.{minor - 1}") if minor > 0 else None
          if one_below is not None and spec.contains(one_below, prereleases=True):
              sys.exit(
                  f"abi3 floor / requires-python drift: pyproject.toml "
                  f"`requires-python = {spec_str!r}` would accept Python "
                  f"{one_below}, but the abi3 wheel from "
                  f"`abi3-py{abi3_digits}` requires Python >= {abi3_floor}."
              )
          print(f"OK: abi3-py{abi3_digits} ({abi3_floor}) ↔ requires-python = {spec_str!r}")
          PY

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dev dependencies
        run: uv sync --group dev --locked --no-install-project
      - name: Run ruff check
        run: uv run poe check-lint
      - name: Run ruff format
        run: uv run poe check-format
      - name: Run mypy
        run: uv run poe check-typing

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: clippy
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-clippy
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-
      - run: cargo clippy --features dev --all-targets -- -D warnings

  clippy-all-features:
    # Lints the feature-gated code that `--features dev` never compiles —
    # notably `python` (pyo3) and `hgvs-rs`, whose `#[cfg(test)]` modules are
    # otherwise unbuilt in CI and silently rot when the production API they
    # construct changes. Complements (does not replace) the `clippy` job
    # above: that one lints the `#[cfg(not(feature = ...))]` slice and the
    # default-features-off code most consumers compile, which `--all-features`
    # cannot see.
    name: Clippy (all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: clippy
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-clippy-all-features
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-
      - run: cargo clippy --all-features --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      # The Test job builds and LINKS ~179 separate integration-test
      # binaries (tests/*.rs). With full debuginfo (dev/test profile
      # default `debug = true`) the linked `target/` exhausts the stock
      # runner's ~14 GB free disk, and the linker dies with
      # `ld terminated with signal 7 (Bus error)` — a write past a full
      # disk. Stripping test-binary debuginfo in CI removes the bulk of
      # each binary's size. CI-only (not in Cargo.toml), so local dev
      # keeps full debuginfo for backtraces.
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - name: Free up runner disk space
        # Reclaim large preinstalled toolchains ferro's build never uses
        # (~25-30 GB), as a second guard against the disk-exhaustion link
        # crash above. Inline removal avoids adding a third-party action.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          lfs: true
          submodules: true
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
      - uses: taiki-e/install-action@8e83571c9a797c9e42a58141f098806bfec453a0  # nextest
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          # `-nodebug` suffix: with CARGO_PROFILE_TEST_DEBUG=0 the test
          # artifacts are much smaller. A fresh key prevents restoring the
          # old debuginfo-laden `target/` (which would refill the disk and
          # defeat the size reduction). Don't fall back to the generic
          # `-cargo-` caches for the same reason — only reuse a Cargo.lock-
          # matched nodebug cache.
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-test-nodebug
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-test-nodebug
      - name: "Note: reference-aware tests are skipped without a manifest"
        # `tests/mutalyzer_normalize_tests.rs` and the biocommons
        # reference-aware suite both silently no-op when
        # `FERRO_MANIFEST` is unset (PR CI does not provision the
        # multi-GB reference manifest). Surface a GitHub annotation
        # so reviewers see the skip explicitly in the PR check
        # summary; the nightly `nightly-mutalyzer.yml` workflow runs
        # the same suite with a real manifest. #397 item 6.
        run: |
          echo "::notice title=Reference-aware tests skipped on PR CI::PR CI does not provision FERRO_MANIFEST; the mutalyzer / biocommons reference-aware test suites silently skip. The nightly nightly-mutalyzer.yml workflow runs the full suite against a real manifest."
      - name: Generate HGVS v21.0 spec fixture
        # The fixture is a generated artifact (gitignored), not committed.
        # Regenerate it before the test run; the generator also validates the
        # overrides file, which is the guard the old `--check` step provided.
        run: cargo run --features dev --example generate_spec_fixture
      - name: Run Rust tests
        run: cargo nextest run --features dev
      - name: Verify conformance summary docs are up to date
        run: cargo run --features dev --example generate_conformance_summary -- --check
      - name: Install dev dependencies
        run: uv sync --group dev --locked --no-install-project
      - name: Run Python tests
        run: uv run poe check-tests

  # Builds the release wheel with maturin and exercises it from a clean venv,
  # outside the source tree. This catches packaging issues (missing data files,
  # stale stubs, sys.path leakage) that the editable-mode install in the `test`
  # job above can hide.
  python-wheel-test:
    name: Python Wheel Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-wheel
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-
      - name: Build release wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'maturin>=1.0,<2.0'
          maturin build --release --features python --out dist
      - name: Install wheel into clean venv
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --upgrade pip
          /tmp/wheel-venv/bin/pip install --no-index --find-links dist ferro-hgvs
          /tmp/wheel-venv/bin/pip install pytest
      - name: Verify import resolves to installed wheel
        run: |
          /tmp/wheel-venv/bin/python - <<'PY'
          import ferro_hgvs
          assert "/tmp/wheel-venv" in ferro_hgvs.__file__, ferro_hgvs.__file__
          print("OK: imported from", ferro_hgvs.__file__)
          PY
      - name: Run Python tests against installed wheel
        working-directory: /tmp
        run: >
          /tmp/wheel-venv/bin/pytest
          --import-mode=importlib
          --rootdir=/tmp
          "$GITHUB_WORKSPACE/tests/python/" -v

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: true
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-release
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-
      - run: cargo build --release
      - name: Check binary size
        run: |
          ls -lh target/release/ferro
          size=$(stat -c%s target/release/ferro 2>/dev/null || stat -f%z target/release/ferro)
          echo "Binary size: $size bytes"
          if [ "$size" -gt 10485760 ]; then
            echo "Error: Binary size exceeds 10MB limit"
            exit 1
          fi
